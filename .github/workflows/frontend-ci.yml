name: Frontend CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
      - codex/marketing-workflow-demo
      - "feat/**"
      - "feature/**"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - ".env*"
              - ".github/workflows/ci.yml"
              - ".github/workflows/frontend-ci.yml"
              - "apps/web/**"
              - "package.json"
              - "packages/contracts/**"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "tsconfig*.json"
              - "tsconfig.base.json"

  frontend-unit:
    name: Frontend Unit (${{ matrix.shard }})
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - "1/2"
          - "2/2"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test frontend (unit)
        run: pnpm --filter @chatai/web test:unit --shard=${{ matrix.shard }}

  frontend-verify:
    name: Frontend Verify
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter @chatai/web typecheck

      - name: Test frontend (integration)
        run: pnpm --filter @chatai/web test:integration

      - name: Build frontend
        run: pnpm --filter @chatai/web build

  frontend:
    name: Frontend
    needs:
      - changes
      - frontend-unit
      - frontend-verify
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend jobs
        run: |
          echo "Frontend Unit: ${{ needs.frontend-unit.result }}"
          echo "Frontend Verify: ${{ needs.frontend-verify.result }}"

          if [[ "${{ needs.frontend-unit.result }}" != "success" || "${{ needs.frontend-verify.result }}" != "success" ]]; then
            exit 1
          fi
