name: Sync GitHub to Gitee (Self-hosted)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 30
    steps:
      - name: Mirror to Gitee in Docker
        env:
          GITEE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          docker run --rm \
            -e GITEE_KEY \
            -e GITHUB_TOKEN \
            -e GITHUB_REPOSITORY \
            alpine:3.20 sh -c '
              set -eu
              apk add --no-cache ca-certificates git openssh-client >/dev/null

              mkdir -p /root/.ssh
              printf "%s\n" "$GITEE_KEY" > /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              ssh-keyscan -H gitee.com >> /root/.ssh/known_hosts

              workdir=/tmp/chatai-sync
              rm -rf "$workdir"
              mkdir -p "$workdir"
              cd "$workdir"

              git clone --bare "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
              cd repo.git
              git remote set-url origin git@gitee.com:dtminds/ChatAI.git
              git push origin "+refs/heads/*:refs/heads/*"
              git push origin "+refs/tags/*:refs/tags/*"
            '
