name: Sync GitHub to Gitee (Self-hosted)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 30
    steps:
      - name: Mirror to Gitee in Docker
        env:
          GITEE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat > /tmp/gitee-sync.sh <<'EOF'
          set -eu

          echo "::group::Install dependencies"
          sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
          apk add --no-cache ca-certificates git openssh-client >/dev/null
          echo "::endgroup::"

          echo "::group::Configure SSH"
          mkdir -p /root/.ssh
          printf "%s\n" "$GITEE_KEY" > /root/.ssh/id_rsa
          chmod 600 /root/.ssh/id_rsa
          cat > /root/.ssh/known_hosts <<'KNOWN_HOSTS'
          gitee.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKxHSJ7084RmkJ4YdEi5tngynE8aZe2uEoVVsB/OvYN
          gitee.com ssh-rsa 
          KNOWN_HOSTS
          echo "::endgroup::"

          echo "::group::Clone GitHub mirror"
          workdir=/tmp/repo-sync
          rm -rf "$workdir"
          git clone --bare \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$workdir"
          echo "::endgroup::"

          cd "$workdir"

          echo "::group::Switch remote to Gitee"
          git remote set-url origin git@gitee.com:dtminds/ChatAI.git
          echo "::endgroup::"

          echo "::group::Push branches"
          git push --verbose origin "+refs/heads/*:refs/heads/*"
          echo "::endgroup::"

          echo "::group::Push tags"
          git push --verbose origin "+refs/tags/*:refs/tags/*"
          echo "::endgroup::"
          EOF

          chmod +x /tmp/gitee-sync.sh

          docker run --rm \
            -e GITEE_KEY="$GITEE_KEY" \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            -v /tmp/gitee-sync.sh:/sync.sh \
            alpine:3.20 sh /sync.sh
