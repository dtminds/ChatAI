server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router fallback: 所有非 API 请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止将 /api/* 回退到 index.html
    location /api/ {
        # 这个 location 块不会被使用，因为 /api/* 由 Ingress 转发到 backend
        # 但作为安全兜底，返回 404
        return 404;
    }

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 不缓存 index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
