name: Backend CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
      - codex/marketing-workflow-demo
      - "feat/**"
      - "feature/**"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Backend Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - ".env*"
              - ".github/workflows/backend-ci.yml"
              - ".github/workflows/ci.yml"
              - "apps/backend/**"
              - "apps/workflow-worker/**"
              - "deploy/workflow-worker.Dockerfile"
              - "package.json"
              - "packages/contracts/**"
              - "packages/workflow-engine/**"
              - "packages/workflow-runtime/**"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "tsconfig*.json"
              - "tsconfig.base.json"

  backend:
    name: Backend
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm backend:typecheck

      - name: Test contracts
        run: pnpm --filter @chatai/contracts test

      - name: Test workflow engine
        run: pnpm --filter @chatai/workflow-engine test

      - name: Test workflow runtime
        run: pnpm --filter @chatai/workflow-runtime test

      - name: Test workflow worker
        env:
          WORKFLOW_BROKER: fake
        run: pnpm --filter @chatai/workflow-worker test

      - name: Test backend
        run: pnpm backend:test

      - name: Build contracts
        run: pnpm --filter @chatai/contracts build

      - name: Build workflow engine
        run: pnpm --filter @chatai/workflow-engine build

      - name: Build workflow runtime
        run: pnpm --filter @chatai/workflow-runtime build

      - name: Build workflow worker
        run: pnpm --filter @chatai/workflow-worker build

      - name: Build workflow worker image
        run: docker build -f deploy/workflow-worker.Dockerfile -t chatai-workflow-worker:ci .

      - name: Build backend
        run: pnpm backend:build
