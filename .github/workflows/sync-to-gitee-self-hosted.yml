name: Sync GitHub to Gitee (Self-hosted)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 30
    steps:
      - name: Mirror to Gitee in Docker
        env:
          GITEE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          docker run --rm \
            -e GITEE_KEY \
            -e GITHUB_TOKEN \
            -e GITHUB_REPOSITORY \
            alpine:3.20 sh -c '
              set -eu

              echo "::group::Install dependencies"
              apk add --no-cache ca-certificates git openssh-client >/dev/null
              echo "::endgroup::"

              echo "::group::Configure SSH"
              mkdir -p /root/.ssh
              printf "%s\n" "$GITEE_KEY" > /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              : > /root/.ssh/known_hosts
              printf '%s\n' \
                'gitee.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKxHSJ7084RmkJ4YdEi5tngynE8aZe2uEoVVsB/OvYN' \
                'gitee.com ssh-rsa ' \
                >> /root/.ssh/known_hosts
              echo "::endgroup::"

              workdir=/tmp/chatai-sync
              echo "::group::Prepare workdir"
              rm -rf "$workdir"
              mkdir -p "$workdir"
              cd "$workdir"
              echo "::endgroup::"

              echo "::group::Clone GitHub mirror"
              git clone --bare --progress "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
              echo "::endgroup::"

              cd repo.git
              echo "::group::Switch remote"
              git remote set-url origin git@gitee.com:dtminds/ChatAI.git
              echo "::endgroup::"

              echo "::group::Push branches"
              git push --verbose origin "+refs/heads/*:refs/heads/*"
              echo "::endgroup::"

              echo "::group::Push tags"
              git push --verbose origin "+refs/tags/*:refs/tags/*"
              echo "::endgroup::"
            '
