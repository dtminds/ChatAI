name: Sync GitHub to Gitee

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to Gitee
        env:
          GITEE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 配置 Gitee SSH 认证
          mkdir -p ~/.ssh
          echo "$GITEE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts
          
          # 2. 从 GitHub mirror clone
          git clone --mirror https://x-access-token:${GITHUB_TOKEN}@github.com/dtminds/ChatAI.git repo.git
          
          # 3. 推送到 Gitee（排除 GitHub PR refs）
          cd repo.git
          git remote set-url origin git@gitee.com:dtminds/ChatAI.git
          
          # 推送所有分支
          git push origin '+refs/heads/*:refs/heads/*'
          
          # 推送所有标签
          git push origin '+refs/tags/*:refs/tags/*'
